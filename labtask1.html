<!DOCTYPE html>
<html>
    <head>
        <title>lab task 1</title>
    </head>

    <body>
        <center>
            <h1>Internship Confirmation Form</h1>
        </center>

        <form>
            Student Name:
            <input type = "text" name = "name" required>
            <br><br>
            
            Email Address:
            <input type = "email" name = "email" required>
            <br><br>

            Preferred Internship Type: <br>
            <input type = "radio" name = "type" value = "onsite"> On-Site <br>
            <input type = "radio" name = "type" value = "remote"> Remote
            <br><br>

            Internship Duaration:
            <select name = "duration">
                <option>6 Weeks</option>
                <option>3 Months</option>
            </select>
            <br><br>

            Skills of Internship: <br>
            <input type="checkbox" name = "Skillnumber1"> Web Development <br>
            <input type="checkbox" name = "Skillnumber2"> Data Analysis <br>
            <input type="checkbox" name = "Skillnumber3"> Mobile Apps <br>
            <br><br>

            <input type = "submit" value = "Submit">
        </form>
    </body>
</html>
